name: Build Engineering Intelligence

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Mermaid tooling
        run: npm install

      - name: Build and validate editions
        run: make validate

      - name: Upload publication artifacts
        uses: actions/upload-artifact@v4
        with:
          name: engineering-intelligence-${{ github.sha }}
          path: |
            build/engineering-intelligence.html
            build/engineering-intelligence.pdf
            build/manifest.json
            build/figures/mermaid/*.svg
          if-no-files-found: error
          retention-days: 30

      - name: Attach editions to tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/engineering-intelligence.html
            build/engineering-intelligence.pdf
            build/manifest.json
