name: Build Engineering Intelligence

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: engineering-intelligence-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  source-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run publication validator tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v

      - name: Validate AsciiDoc source graph
        run: python3 scripts/validate_sources.py

  build:
    needs: source-validation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set reproducible publication time
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Mermaid tooling
        run: npm install --no-audit --no-fund

      - name: Build and validate editions
        run: make validate

      - name: Verify manifest source commit
        run: python3 scripts/validate_manifest.py build "$GITHUB_SHA"

      - name: Upload publication artifacts
        uses: actions/upload-artifact@v7
        with:
          name: engineering-intelligence-${{ github.sha }}
          path: |
            build/engineering-intelligence.html
            build/engineering-intelligence.pdf
            build/manifest.json
            build/figures/mermaid/*.svg
          if-no-files-found: error
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Download publication artifacts
        uses: actions/download-artifact@v4
        with:
          name: engineering-intelligence-${{ github.sha }}
          path: build

      - name: Revalidate downloaded release artifacts
        run: python3 scripts/validate_manifest.py build "$GITHUB_SHA"

      - name: Attach editions to tagged release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/engineering-intelligence.html
            build/engineering-intelligence.pdf
            build/manifest.json
