extends: default

page:
  size: Letter
  layout: portrait
  margin: [0.75in, 0.75in, 0.8in, 0.75in]

base:
  font-family: Times-Roman
  font-size: 10.5
  line-height-length: 15
  font-color: 222222

heading:
  font-family: Helvetica
  font-color: 17365D
  font-style: bold
  line-height: 1.15
  margin-top: 18
  margin-bottom: 8

heading-h1:
  font-size: 26
  page-break-before: always
  margin-top: 0
  margin-bottom: 20

heading-h2:
  font-size: 17
  margin-top: 22
  margin-bottom: 8

heading-h3:
  font-size: 13
  margin-top: 16
  margin-bottom: 6

heading-h4:
  font-size: 11
  margin-top: 12
  margin-bottom: 4

link:
  font-color: 245A88

prose:
  margin-bottom: 8

# First letter of the first paragraph after each chapter opening gets a
# large drop-cap to echo the illustrated plate above it. Configured via
# an AsciiDoc role applied on the paragraph.

role:
  dropcap:
    font-family: Times-Roman
    font-color: 17365D
    font-size: 40
    font-style: bold
  lead:
    font-size: 11.5
    font-color: 2A3947
  copyright-block:
    font-family: Times-Roman
    font-size: 9.5
    font-color: 444444
    line-height: 1.35
  dedication:
    font-family: Times-Roman
    font-style: italic
    font-color: 17365D
    font-size: 13
    align: center
    margin-top: 120
    line-height: 1.4

caption:
  font-family: Helvetica
  font-size: 8.5
  font-style: italic
  font-color: 555555
  align: left

code:
  font-family: Courier
  font-size: 8.5
  background-color: F5F7F9
  border-color: D8DEE6
  border-width: 0.5
  padding: 8

codespan:
  font-family: Courier
  font-size: 8.5

quote:
  font-family: Times-Roman
  font-color: 17365D
  border-color: B78331
  border-width: 0 0 0 3
  padding: [2, 0, 2, 14]

admonition:
  column-rule-color: 17365D
  column-rule-width: 1.4
  padding: [8, 10, 8, 12]
  background-color: F5EBD6

admonition-label:
  font-family: Helvetica
  font-style: bold
  font-color: 17365D
  text-transform: uppercase

admonition-icon:
  tip:
    stroke-color: B78331
  important:
    stroke-color: 6C371F
  warning:
    stroke-color: 6C371F
  note:
    stroke-color: 17365D
  caution:
    stroke-color: B78331

sidebar:
  background-color: F5EBD6
  border-color: B78331
  border-width: 0
  border-radius: 3
  padding: 12

sidebar-title:
  font-family: Times-Roman
  font-style: bold
  font-color: 17365D

example:
  background-color: F8F1DF
  border-color: B78331
  border-width: 0.7
  border-radius: 2
  padding: 12

example-caption:
  font-family: Helvetica
  font-style: bold
  font-color: 17365D

list:
  indent: 18
  item-spacing: 3

ulist:
  marker-font-color: B78331

olist:
  marker-font-color: B78331

table:
  border-color: 17365D
  border-width: 0.7
  grid-color: DCECF4
  grid-width: 0.4
  cell-padding: 6
  head:
    background-color: 17365D
    font-family: Helvetica
    font-style: bold
    font-color: F5EBD6
  body:
    stripe-background-color: F5EBD6

image:
  align: center

footer:
  height: 0.45in
  line-height: 1
  font-family: Helvetica
  font-size: 8
  font-color: 6B7280
  border-color: B78331
  border-width: 0.4
  recto:
    left:
      content: '{document-title}'
    right:
      content: '{page-number}'
  verso:
    left:
      content: '{page-number}'
    right:
      content: '{chapter-title}'

toc:
  font-family: Helvetica
  font-size: 9.5
  line-height: 1.25
  dot-leader:
    font-color: 9AA7B4
  h2:
    font-style: bold
    font-color: 17365D
  h3:
    font-color: 444444

title-page:
  align: left
  title:
    top: 26%
    font-family: Helvetica
    font-size: 32
    font-style: bold
    font-color: 17365D
    line-height: 1.1
  subtitle:
    font-family: Helvetica
    font-size: 15
    font-color: 4B5563
    line-height: 1.25
  authors:
    margin-top: 30
    font-family: Helvetica
    font-size: 12
    font-color: 374151

index:
  columns: 2
